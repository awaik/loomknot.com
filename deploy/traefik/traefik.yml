# Traefik v3 static configuration
api:
  dashboard: false

log:
  level: WARN

accessLog:
  bufferingSize: 100

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
    transport:
      respondingTimeouts:
        readTimeout: 300s
        writeTimeout: 0s
        idleTimeout: 600s

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@loomknot.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
  file:
    directory: /etc/traefik/dynamic
    watch: true
