# =============================================================================
# TRAEFIK v3 — Swarm stack (always running, auto-restart)
# Deploy: docker stack deploy -c docker-compose.yml traefik
# =============================================================================
version: "3.8"

services:
  traefik:
    image: traefik:v3.3
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /opt/traefik/dynamic:/etc/traefik/dynamic:ro
      - /opt/traefik/acme.json:/acme.json
    networks:
      - traefik-public
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 5s

networks:
  traefik-public:
    external: true
